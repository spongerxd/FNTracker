[InstallBundleSubsetDefinition GFP_BRCosmeticsInstallOnDemandFat_EnableIAD]
FileRegex=".*chunk100fatiad[^\d].*(pak|sig|uondemandtoc)"

[InstallBundleSubsetDefinition GFP_BRCosmeticsInstallOnDemandFat_DisableIAD]
